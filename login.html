<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Conveyor System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0d47a1, #1a237e);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #0d47a1;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #ff9800;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #e68900;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Conveyor Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div class="footer">
      SAIL Conveyor System
    </div>
  </div>

  <script type="module">

    import supabase from "./supabase.js";

    // 🔐 LOGIN FUNCTION
    async function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        alert("Please fill all fields");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if(error){
        alert("Login failed: " + error.message);
        return;
      }

      // 🔥 SUCCESS → go to dashboard
      window.location.href = "index.html";
    }

    // expose globally (important)
    window.login = login;

    // 🔐 AUTO CHECK (if already logged in)
    const { data: { user } } = await supabase.auth.getUser();

    if(user){
      window.location.href = "index.html";
    }

  </script>

</body>
</html>
